name: Test report

on:
  workflow_run:
    workflows: ['build']
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: dorny/test-reporter@v2.6.0
        with:
          artifact: /test-results-(.*)/
          name: Unit tests ($1)
          path: '*.xml'
          reporter: java-junit
